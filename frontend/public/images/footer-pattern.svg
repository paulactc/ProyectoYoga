<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <defs>
    <!-- planta base: tierra, tallo, hojas, brote -->
    <g id="planta">
      <path d="M-14 10 Q0 8 14 10" stroke="rgba(212,160,96,0.55)" stroke-width="1.2" stroke-linecap="round" fill="none"/>
      <line x1="0" y1="10" x2="0" y2="0" stroke="rgba(212,160,96,0.55)" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M0 6 C-4 2 -9 4 -7 8" stroke="rgba(212,160,96,0.45)" stroke-width="1.1" stroke-linecap="round" fill="none"/>
      <path d="M0 3 C4 -1 9 1 7 5" stroke="rgba(212,160,96,0.45)" stroke-width="1.1" stroke-linecap="round" fill="none"/>
      <path d="M0 0 C-0.5 -3 -2 -5 0 -6 C2 -5 0.5 -3 0 0" stroke="rgba(212,160,96,0.5)" stroke-width="1.1" stroke-linecap="round" fill="none"/>
    </g>
  </defs>

  <!-- fila 1 -->
  <use href="#planta" transform="translate(30,45) scale(1.6)"/>
  <use href="#planta" transform="translate(100,30) scale(1.1) rotate(8,0,0)"/>
  <use href="#planta" transform="translate(170,50) scale(1.4) rotate(-6,0,0)"/>

  <!-- fila 2 -->
  <use href="#planta" transform="translate(15,115) scale(1.0) rotate(5,0,0)"/>
  <use href="#planta" transform="translate(70,130) scale(1.8)"/>
  <use href="#planta" transform="translate(145,105) scale(1.2) rotate(-10,0,0)"/>
  <use href="#planta" transform="translate(195,130) scale(0.9) rotate(4,0,0)"/>

  <!-- fila 3 -->
  <use href="#planta" transform="translate(45,185) scale(1.3) rotate(-5,0,0)"/>
  <use href="#planta" transform="translate(120,175) scale(1.0) rotate(7,0,0)"/>
  <use href="#planta" transform="translate(185,190) scale(1.5)"/>
</svg>
