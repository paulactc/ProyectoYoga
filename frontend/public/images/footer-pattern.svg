<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <g transform="translate(100,100)" fill="none">
    <!-- Outer rings -->
    <circle r="90" stroke="rgba(212,160,96,0.05)" stroke-width="0.5"/>
    <circle r="78" stroke="rgba(212,160,96,0.07)" stroke-width="0.5"/>
    <!-- 12-point star ring -->
    <g stroke="rgba(212,160,96,0.09)" stroke-width="0.7">
      <line x1="0" y1="-78" x2="0" y2="-58"/>
      <line x1="0" y1="58" x2="0" y2="78"/>
      <line x1="-78" y1="0" x2="-58" y2="0"/>
      <line x1="58" y1="0" x2="78" y2="0"/>
      <line x1="-55" y1="-55" x2="-41" y2="-41"/>
      <line x1="41" y1="41" x2="55" y2="55"/>
      <line x1="55" y1="-55" x2="41" y2="-41"/>
      <line x1="-41" y1="41" x2="-55" y2="55"/>
      <line x1="-30" y1="-73" x2="-22" y2="-54"/>
      <line x1="22" y1="54" x2="30" y2="73"/>
      <line x1="73" y1="-30" x2="54" y2="-22"/>
      <line x1="-54" y1="22" x2="-73" y2="30"/>
      <line x1="30" y1="-73" x2="22" y2="-54"/>
      <line x1="-22" y1="54" x2="-30" y2="73"/>
      <line x1="-73" y1="-30" x2="-54" y2="-22"/>
      <line x1="54" y1="22" x2="73" y2="30"/>
    </g>
    <!-- Middle decorative ring -->
    <circle r="58" stroke="rgba(212,160,96,0.10)" stroke-width="0.6"/>
    <circle r="48" stroke="rgba(212,160,96,0.08)" stroke-width="0.5"/>
    <!-- 8-petal lotus ring -->
    <g stroke="rgba(212,160,96,0.13)" stroke-width="0.8">
      <ellipse rx="20" ry="8" transform="rotate(0) translate(28,0)"/>
      <ellipse rx="20" ry="8" transform="rotate(45) translate(28,0)"/>
      <ellipse rx="20" ry="8" transform="rotate(90) translate(28,0)"/>
      <ellipse rx="20" ry="8" transform="rotate(135) translate(28,0)"/>
      <ellipse rx="20" ry="8" transform="rotate(180) translate(28,0)"/>
      <ellipse rx="20" ry="8" transform="rotate(225) translate(28,0)"/>
      <ellipse rx="20" ry="8" transform="rotate(270) translate(28,0)"/>
      <ellipse rx="20" ry="8" transform="rotate(315) translate(28,0)"/>
    </g>
    <!-- Inner sacred geometry -->
    <circle r="22" stroke="rgba(212,160,96,0.12)" stroke-width="0.6"/>
    <!-- Inner 6-pointed star (Star of David / hexagram) -->
    <g stroke="rgba(212,160,96,0.15)" stroke-width="0.8">
      <polygon points="0,-18 15.6,9 -15.6,9"/>
      <polygon points="0,18 15.6,-9 -15.6,-9"/>
    </g>
    <!-- Center circle -->
    <circle r="7" stroke="rgba(212,160,96,0.18)" stroke-width="0.8"/>
    <circle r="3" fill="rgba(212,160,96,0.12)" stroke="none"/>
    <!-- Corner dots -->
    <g fill="rgba(212,160,96,0.12)">
      <circle cx="0" cy="-90" r="1.5"/>
      <circle cx="0" cy="90" r="1.5"/>
      <circle cx="-90" cy="0" r="1.5"/>
      <circle cx="90" cy="0" r="1.5"/>
      <circle cx="-63" cy="-63" r="1"/>
      <circle cx="63" cy="-63" r="1"/>
      <circle cx="-63" cy="63" r="1"/>
      <circle cx="63" cy="63" r="1"/>
    </g>
  </g>
</svg>
